<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AES šifravimo sistema</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>AES šifravimas / dešifravimas</h1>

  <form id="aesForm">

    <label>Operacija</label>
    <select name="operation">
      <option value="encrypt">Šifruoti</option>
      <option value="decrypt">Dešifruoti</option>
    </select>

    <label>Šifravimo modas</label>
    <select name="mode">
      <option value="ECB">ECB</option>
      <option value="CBC">CBC</option>
      <option value="CFB">CFB</option>
    </select>

    <label>Rakto ilgis</label>
    <select name="key_length">
      <option value="128">128 bitų</option>
      <option value="192">192 bitų</option>
      <option value="256">256 bitų</option>
    </select>

    <label>Slaptas raktas</label>
    <input type="text" name="key" required>

    <label>Tekstas</label>
    <textarea name="text" rows="6"></textarea>

    <label>Arba įkelkite .txt failą</label>
    <input type="file" name="file">

    <button type="submit">Vykdyti</button>

  </form>

  <h3>Rezultatas</h3>

  <textarea id="result" rows="8" readonly></textarea>

</div>

<script>

  document.getElementById("aesForm").addEventListener("submit", function(e){

    e.preventDefault();

    let formData = new FormData(this);

    fetch("process.php",{
      method:"POST",
      body:formData
    })
            .then(response => response.text())
            .then(data => {
              document.getElementById("result").value = data;
            });

  });

</script>

</body>
</html>
